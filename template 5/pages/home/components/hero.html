            <div style="width: 60px; height: 4px; background: var(--color-primary); margin-bottom: 40px;"></div>

            </p>
            <a href="#" onclick="navigate('projects')"

                <span
                    style="width: 50px; height: 50px; background: var(--color-primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: rotate(-10deg);">
                    <i class="fa-solid fa-arrow-up-right-from-square"
                        style="transform: rotate(10deg); font-size: 0.8rem;"></i>

        <div class="neo-reveal" style="position: relative; height: 750px;" data-delay="0.2s">

            <div
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); z-index: 1; box-shadow: 30px 30px 60px rgba(0,0,0,0.3);">

            <div
                style="position: absolute; bottom: 5%; right: -20px; background: #fff; padding: 30px 50px; z-index: 2; transform: rotate(-5deg); box-shadow: 10px 10px 30px rgba(0,0,0,0.1);">
