<section class="section-padding stats-neo"
    style="background: var(--color-secondary); color: white; position: relative;">
    <div style="position: absolute; top: 0; right: 20%; width: 2px; height: 100%; background: rgba(255,255,255,0.1);">
    </div>
    <div style="position: absolute; bottom: 30%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1);">
    </div>

    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px;">
            <!-- Stat 1 -->
            <div class="neo-reveal-up" style="position: relative;">
                <div
                    style="font-size: 8rem; font-weight: 900; line-height: 1; letter-spacing: -5px; color: var(--color-primary);">
                    15</div>
                <div
                    style="position: absolute; top: 20px; left: 100px; background: white; color: black; padding: 10px 20px; font-weight: 800; transform: rotate(5deg); box-shadow: 10px 10px 0 rgba(0,0,0,0.2);">
                    NĂM</div>
                <p
                    style="margin-top: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6;">
                    Kinh Nghiệm</p>
            </div>

            <!-- Stat 2 -->
            <div class="neo-reveal-up" style="position: relative;" data-delay="0.1s">
                <div
                    style="font-size: 8rem; font-weight: 900; line-height: 1; letter-spacing: -5px; color: white; -webkit-text-stroke: 2px var(--color-primary);">
                    500</div>
                <div
                    style="position: absolute; top: 20px; left: 110px; background: var(--color-primary); color: white; padding: 10px 20px; font-weight: 800; transform: rotate(-5deg); box-shadow: 10px 10px 0 rgba(0,0,0,0.2);">
                    DỰ ÁN</div>
                <p
                    style="margin-top: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6;">
                    Đã Hoàn Thành</p>
            </div>

            <!-- Stat 3 -->
            <div class="neo-reveal-up" style="position: relative;" data-delay="0.2s">
                <div
                    style="font-size: 8rem; font-weight: 900; line-height: 1; letter-spacing: -5px; color: var(--color-primary);">
                    100</div>
                <div
                    style="position: absolute; top: 20px; left: 120px; background: white; color: black; padding: 10px 20px; font-weight: 800; transform: rotate(10deg); box-shadow: 10px 10px 0 rgba(0,0,0,0.2);">
                    NHÂN SỰ</div>
                <p
                    style="margin-top: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6;">
                    Kỹ Sư & Chuyên Gia</p>
            </div>

            <!-- Stat 4 -->
            <div class="neo-reveal-up" style="position: relative;" data-delay="0.3s">
                <div style="font-size: 8rem; font-weight: 900; line-height: 1; letter-spacing: -5px; color: white;">07
                </div>
                <div
                    style="position: absolute; top: 20px; left: 100px; background: var(--color-primary); color: white; padding: 10px 20px; font-weight: 800; transform: rotate(-10deg); box-shadow: 10px 10px 0 rgba(0,0,0,0.2);">
                    GIẢI THƯỞNG</div>
                <p
                    style="margin-top: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6;">
                    Uy Tín Ngành</p>
            </div>
        </div>
    </div>
</section>
