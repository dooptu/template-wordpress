<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC | Neo-Constructivist Excellence</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header id="header-placeholder" style="position: fixed; top: 0; width: 100%; z-index: 1000;"></header>

    <main id="main-content">
        <!-- Content will be loaded here -->
    </main>

    <footer id="footer-placeholder"></footer>

    <script>
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const html = await response.text();
                const container = document.getElementById(id);
                if (container) {
                    container.innerHTML = html;
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        if (script.src) {
                            newScript.src = script.src;
                        } else {
                            newScript.textContent = script.textContent;
                        }
                        document.body.appendChild(newScript);
                    });
                }
            } catch (error) {
                console.error('Neo System Error:', path, error);
            }
        }

        async function navigate(page) {
            const main = document.getElementById('main-content');
            main.style.opacity = '0';

            setTimeout(async () => {
                const path = `pages/${page}/${page}.html`;
                await loadComponent('main-content', path);
                main.style.opacity = '1';
                window.scrollTo(0, 0);
                setTimeout(initReveal, 100);
            }, 400);
        }

        function initReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.neo-reveal').forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-placeholder', 'components/header.html');
            loadComponent('footer-placeholder', 'components/footer.html');
            navigate('home');
        });
    </script>
    <style>
        #main-content {
            transition: opacity 0.4s ease;
            min-height: 100vh;
        }
    </style>
</body>

</html>
