        <span class="logo-square"></span>
        PTEC <span class="playfair logo-accent">Neo</span>
    </div>

    <div class="neo-menu-desktop">
        <a href="#" onclick="navigate('home')">Trang Chủ</a>
        <a href="#" onclick="navigate('about')">Giới Thiệu</a>
        <a href="#" onclick="navigate('services')">Dịch Vụ</a>
        <a href="#" onclick="navigate('projects')">Dự Án</a>
        <a href="#" onclick="navigate('blog')">Tin Tức</a>
        <a href="#" onclick="navigate('contact')">Liên Hệ</a>
    </div>

    <div class="neo-menu-toggle" onclick="toggleNeoMenu()">
        <div class="toggle-box">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>
</nav>

<!-- Mobile Menu Overlay -->
<div class="neo-mobile-overlay" id="neoMobileOverlay">
    <div class="overlay-close" onclick="toggleNeoMenu()">
        <i class="fa-solid fa-xmark"></i>
    </div>
    <div class="overlay-links">
        <a href="#" onclick="navigate('home'); toggleNeoMenu()">Trang Chủ</a>
        <a href="#" onclick="navigate('about'); toggleNeoMenu()">Giới Thiệu</a>
        <a href="#" onclick="navigate('services'); toggleNeoMenu()">Dịch Vụ</a>
        <a href="#" onclick="navigate('projects'); toggleNeoMenu()">Dự Án</a>
        <a href="#" onclick="navigate('blog'); toggleNeoMenu()">Tin Tức</a>
        <a href="#" onclick="navigate('contact'); toggleNeoMenu()">Liên Hệ</a>
    </div>
</div>

<style>
    .neo-nav {
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-bottom: 2px solid var(--color-secondary);
        position: relative;
        z-index: 1001;
        transition: var(--transition);
    }

    .neo-logo {
        font-weight: 800;
        font-size: 1.6rem;
        letter-spacing: -1px;
        display: flex;
        align-items: center;
        gap: 12px;
        text-transform: uppercase;
    }

    .logo-square {
        width: 25px;
        height: 25px;
        background: var(--color-primary);
        display: inline-block;
        transform: rotate(45deg);
    }

    .logo-accent {
        font-size: 1.2rem;
        margin-top: 5px;
        text-transform: none;
    }

    .neo-menu-desktop {
        display: flex;
        gap: 35px;
    }

    .neo-menu-desktop a {
        text-decoration: none;
        color: var(--color-text);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 2px;
        position: relative;
        transition: 0.3s;
    }

    .neo-menu-desktop a::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--color-primary);
        transition: 0.3s;
    }

    .neo-menu-desktop a:hover::after {
        width: 100%;
    }

    .neo-menu-toggle {
        display: none;
    }

    .toggle-box {
        width: 45px;
        height: 45px;
        border: 2px solid var(--color-secondary);
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(-10deg);
        cursor: pointer;
        transition: 0.3s;
        background: white;
    }

    .toggle-box i {
        transform: rotate(10deg);
        font-size: 1rem;
    }

    .toggle-box:hover {
        background: var(--color-primary);
        color: white;
        border-color: var(--color-primary);
        transform: rotate(0deg);
    }

    /* Mobile Overlay */
    .neo-mobile-overlay {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100vh;
        background: var(--color-secondary);
        z-index: 2000;
        transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .neo-mobile-overlay.active {
        right: 0;
    }

    .overlay-close {
        position: absolute;
        top: 40px;
        right: 40px;
        width: 50px;
        height: 50px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        transform: rotate(45deg);
        transition: 0.3s;
    }

    .overlay-close i {
        transform: rotate(-45deg);
    }

    .overlay-close:hover {
        background: var(--color-primary);
        border-color: var(--color-primary);
        transform: rotate(0deg);
    }

    .overlay-links {
        display: flex;
        flex-direction: column;
        gap: 30px;
        text-align: center;
    }

    .overlay-links a {
        color: white;
        text-decoration: none;
        font-size: clamp(1.5rem, 8vw, 2.5rem);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -1px;
        transition: 0.3s;
    }

    .overlay-links a:hover {
        color: var(--color-primary);
        transform: skewX(-10deg);
    }

    @media (max-width: 991px) {
        .neo-menu-desktop {
            display: none;
        }

        .neo-menu-toggle {
            display: block;
        }

        .neo-nav {
            padding: 20px;
        }
    }
</style>

<script>
    function toggleNeoMenu() {
        const overlay = document.getElementById('neoMobileOverlay');
        overlay.classList.toggle('active');
        
        if(overlay.classList.contains('active')) {
            document.body.style.overflow = 'hidden';
        } else {
            document.body.style.overflow = 'auto';
        }
    }
</script>
