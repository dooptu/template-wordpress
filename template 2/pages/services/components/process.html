<section class="section-padding process-liquid" style="background: var(--color-white);">
    <div class="container">
        <div class="title-wrapper reveal-liquid text-center" style="margin-bottom: 80px;">
            <h2 style="font-size: 3rem;">QUY TRÌNH <span class="high-text-gradient">CHUYÊN NGHIỆP</span></h2>
        </div>

        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; position: relative;">
            <!-- Process Step 1 -->
            <div class="reveal-liquid text-center">
                <div class="liquid-card"
                    style="width: 120px; height: 120px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 50% 20% 50% 20%;">
                    01
                </div>
                <h4 style="margin-bottom: 10px;">TIẾP NHẬN</h4>
                <p style="font-size: 0.85rem; color: var(--color-text-muted);">Khảo sát & tư vấn sơ bộ</p>
            </div>

            <!-- Process Step 2 -->
            <div class="reveal-liquid text-center" data-delay="0.2s">
                <div class="liquid-card"
                    style="width: 120px; height: 120px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 20% 50% 20% 50%; background: var(--color-black); color: white;">
                    02
                </div>
                <h4 style="margin-bottom: 10px;">THIẾT KẾ</h4>
                <p style="font-size: 0.85rem; color: var(--color-text-muted);">Bản vẽ & báo giá chi tiết</p>
            </div>

            <!-- Process Step 3 -->
            <div class="reveal-liquid text-center" data-delay="0.4s">
                <div class="liquid-card"
                    style="width: 120px; height: 120px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 50% 20% 50% 20%;">
                    03
                </div>
                <h4 style="margin-bottom: 10px;">GIA CÔNG</h4>
                <p style="font-size: 0.85rem; color: var(--color-text-muted);">Sản xuất tại nhà máy</p>
            </div>

            <!-- Process Step 4 -->
            <div class="reveal-liquid text-center" data-delay="0.6s">
                <div class="liquid-card"
                    style="width: 120px; height: 120px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-radius: 20% 50% 20% 50%; background: var(--color-primary); color: white;">
                    04
                </div>
                <h4 style="margin-bottom: 10px;">LẮP DỰNG</h4>
                <p style="font-size: 0.85rem; color: var(--color-text-muted);">Thi công & bàn giao</p>
            </div>
        </div>
    </div>
</section>
