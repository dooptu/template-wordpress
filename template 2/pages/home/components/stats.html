<section class="section-padding stats-liquid glow-bg"
    style="background: var(--color-black); color: white; border-radius: 80px; margin: 40px 10px; overflow: hidden;">
    <div
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, rgba(230,0,0,0.1), transparent); pointer-events: none;">
    </div>
    <div class="container" style="position: relative; z-index: 2;">
        <div class="stats-liquid-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; text-align: center;">
            <div class="stat-liquid-item">
                <h3 class="stat-num" data-target="150"
                    style="font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 10px;">0</h3>
                <p
                    style="font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; opacity: 0.6;">
                    Dự Án Hoàn Thành</p>
            </div>
            <div class="stat-liquid-item">
                <h3 class="stat-num" data-target="8"
                    style="font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 10px;">0</h3>
                <p
                    style="font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; opacity: 0.6;">
                    Năm Kinh Nghiệm</p>
            </div>
            <div class="stat-liquid-item">
                <h3 class="stat-num" data-target="500"
                    style="font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 10px;">0</h3>
                <p
                    style="font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; opacity: 0.6;">
                    Kỹ Sư & Công Nhân</p>
            </div>
            <div class="stat-liquid-item">
                <h3 class="stat-num" data-target="100"
                    style="font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 10px;">0</h3>
                <p
                    style="font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; opacity: 0.6;">
                    % An Toàn</p>
            </div>
        </div>
    </div>
</section>

<script>
    (function () {
        const counters = document.querySelectorAll('.stat-num');
        const counterObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const el = entry.target;
                    const target = parseInt(el.dataset.target);
                    let count = 0;
                    const duration = 2000;
                    const startTime = performance.now();

                    const animate = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / duration, 1);

                        const easedProgress = progress * (2 - progress);
                        count = Math.floor(easedProgress * target);
                        el.innerText = count + (target > 50 ? '+' : '');

                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            el.innerText = target + (target > 50 ? '+' : '');
                        }
                    };
                    requestAnimationFrame(animate);
                    counterObserver.unobserve(el);
                }
            });
        }, { threshold: 0.5 });
        counters.forEach(c => counterObserver.observe(c));
    })();
</script>
