<header
    style="position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 30px 0; mix-blend-mode: difference;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo-kinetic"
            style="color: var(--color-white); font-family: var(--font-heading); font-size: 2rem; letter-spacing: -2px; cursor: pointer;"
            onclick="navigate('home')">
            PTEC<span style="color: var(--color-primary);">.</span>
        </div>

        <nav style="display: flex; gap: 40px;">
            <a href="#" onclick="navigate('home')"
                style="color: var(--color-white); text-decoration: none; font-family: var(--font-heading); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;"
                onmouseover="this.style.color='var(--color-primary)'"
                onmouseout="this.style.color='var(--color-white)'">Home</a>
            <a href="#" onclick="navigate('about')"
                style="color: var(--color-white); text-decoration: none; font-family: var(--font-heading); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;"
                onmouseover="this.style.color='var(--color-primary)'"
                onmouseout="this.style.color='var(--color-white)'">About</a>
            <a href="#" onclick="navigate('services')"
                style="color: var(--color-white); text-decoration: none; font-family: var(--font-heading); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;"
                onmouseover="this.style.color='var(--color-primary)'"
                onmouseout="this.style.color='var(--color-white)'">Services</a>
            <a href="#" onclick="navigate('projects')"
                style="color: var(--color-white); text-decoration: none; font-family: var(--font-heading); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;"
                onmouseover="this.style.color='var(--color-primary)'"
                onmouseout="this.style.color='var(--color-white)'">Projects</a>
            <a href="#" onclick="navigate('contact')"
                style="color: var(--color-white); text-decoration: none; font-family: var(--font-heading); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;"
                onmouseover="this.style.color='var(--color-primary)'"
                onmouseout="this.style.color='var(--color-white)'">Contact</a>
        </nav>
    </div>
</header>
