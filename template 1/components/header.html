<header class="ast-primary-header-bar">
    <div class="container">
        <div class="ast-builder-grid-row">
            <div class="ast-site-identity">
                <div class="ast-site-title-wrap">
                    <h1 class="site-title"><a href="#" onclick="navigate('home')">PTEC<span>.</span></a></h1>
                </div>
            </div>

            <div class="ast-header-right">
                <nav class="main-navigation">
                    <ul class="main-header-menu">
                        <li class="menu-item"><a href="#" onclick="navigate('home')">Trang Chủ</a></li>
                        <li class="menu-item"><a href="#" onclick="navigate('about')">Giới Thiệu</a></li>
                        <li class="menu-item"><a href="#" onclick="navigate('services')">Dịch Vụ</a></li>
                        <li class="menu-item"><a href="#" onclick="navigate('projects')">Dự Án</a></li>
                        <li class="menu-item"><a href="#" onclick="navigate('blog')">Tin Tức</a></li>
                        <li class="menu-item"><a href="#" onclick="navigate('contact')">Liên Hệ</a></li>
                    </ul>
                </nav>

                <div class="ast-header-button">
                    <a href="#" class="ast-custom-button" onclick="navigate('contact')">Tư Vấn Ngay</a>
                </div>

                <button class="menu-toggle" aria-label="Menu Toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </div>
</header>

<script>
    (function () {
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-navigation');
        if (toggle && nav) {
            toggle.onclick = () => {
                nav.classList.toggle('active');
                toggle.querySelector('i').classList.toggle('fa-bars');
                toggle.querySelector('i').classList.toggle('fa-times');
            };
        }
    })();
</script>
