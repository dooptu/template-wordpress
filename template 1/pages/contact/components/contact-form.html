<section class="section-padding contact-upgrade" style="background: white; position: relative; overflow: hidden;">
    <!-- Decor -->
    <div
        style="position: absolute; top:0; left:0; width: 100%; height: 50%; background: var(--color-gray); z-index: -1;">
    </div>

    <div class="container">
        <div class="contact-card glass-card reveal-blur"
            style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 0; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.1); padding: 0;">
            <!-- Info Sidebar -->
            <div class="contact-sidebar" style="background: var(--color-black); color: white; padding: 60px;">
                <h3 style="font-size: 2.2rem; margin-bottom: 20px;">KẾT NỐI VỚI <span
                        style="color: var(--color-red);">PTEC</span></h3>
                <p style="opacity: 0.7; margin-bottom: 40px;">Đội ngũ kỹ sư của chúng tôi sẵn sàng hỗ trợ bạn 24/7 để
                    mang đến giải pháp tối ưu nhất.</p>

                <div class="contact-info-list">
                    <div style="display: flex; gap: 20px; align-items: start; margin-bottom: 30px;">
                        <div
                            style="width: 50px; height: 50px; background: rgba(230,0,0,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--color-red);">
                            <i class="fa-solid fa-location-dot"></i>
                        </div>
                        <div>
                            <h4 style="margin: 0; font-size: 1rem;">Địa Chỉ</h4>
                            <p style="font-size: 0.9rem; opacity: 0.6; margin: 5px 0 0;">Lô F6, KCN Rạch Bắp, Bến Cát,
                                Bình Dương</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 20px; align-items: start; margin-bottom: 30px;">
                        <div
                            style="width: 50px; height: 50px; background: rgba(230,0,0,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--color-red);">
                            <i class="fa-solid fa-phone"></i>
                        </div>
                        <div>
                            <h4 style="margin: 0; font-size: 1rem;">Hotline</h4>
                            <p style="font-size: 0.9rem; opacity: 0.6; margin: 5px 0 0;">0909 123 456</p>
                        </div>
                    </div>
                    <div style="display: flex; gap: 20px; align-items: start;">
                        <div
                            style="width: 50px; height: 50px; background: rgba(230,0,0,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--color-red);">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <div>
                            <h4 style="margin: 0; font-size: 1rem;">Email</h4>
                            <p style="font-size: 0.9rem; opacity: 0.6; margin: 5px 0 0;">info@ptec.vn</p>
                        </div>
                    </div>
                </div>

                <div class="social-connect" style="margin-top: 60px; display: flex; gap: 15px;">
                    <a href="#"
                        style="width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s;"
                        onmouseover="this.style.background='var(--color-red)'"
                        onmouseout="this.style.background='transparent'"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"
                        style="width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s;"
                        onmouseover="this.style.background='var(--color-red)'"
                        onmouseout="this.style.background='transparent'"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </div>

            <!-- Form -->
            <div class="contact-body" style="padding: 60px; background: var(--color-white);">
                <form id="contact-form-upgrade">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                        <div class="input-group">
                            <label
                                style="display: block; font-weight: 700; margin-bottom: 10px; color: var(--color-black);">HỌ
                                VÀ TÊN</label>
                            <input type="text" placeholder="Nguyễn Văn A"
                                style="width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: var(--color-gray); transition: 0.3s;"
                                onfocus="this.style.borderColor='var(--color-red)'; this.style.background='white';">
                        </div>
                        <div class="input-group">
                            <label
                                style="display: block; font-weight: 700; margin-bottom: 10px; color: var(--color-black);">EMAIL</label>
                            <input type="email" placeholder="email@gmail.com"
                                style="width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: var(--color-gray); transition: 0.3s;"
                                onfocus="this.style.borderColor='var(--color-red)'; this.style.background='white';">
                        </div>
                    </div>
                    <div class="input-group" style="margin-bottom: 30px;">
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 10px; color: var(--color-black);">DỊCH
                            VỤ QUAN TÂM</label>
                        <select
                            style="width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: var(--color-gray); transition: 0.3s;"
                            onfocus="this.style.borderColor='var(--color-red)'; this.style.background='white';">
                            <option>Nhà Thép Tiền Chế</option>
                            <option>Hạ Tầng Kỹ Thuật</option>
                            <option>Thiết Kế Cơ Điện</option>
                            <option>Tư Vấn Trọn Gói</option>
                        </select>
                    </div>
                    <div class="input-group" style="margin-bottom: 40px;">
                        <label
                            style="display: block; font-weight: 700; margin-bottom: 10px; color: var(--color-black);">NỘI
                            DUNG CHI TIẾT</label>
                        <textarea rows="5" placeholder="Mô tả sơ lược về yêu cầu dự án của bạn..."
                            style="width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 8px; background: var(--color-gray); transition: 0.3s; resize: none;"
                            onfocus="this.style.borderColor='var(--color-red)'; this.style.background='white';"></textarea>
                    </div>
                    <button type="submit" class="btn btn-red" style="width: 100%; height: 60px; font-size: 1.2rem;">GỬI
                        YÊU CẦU TƯ VẤN <i class="fa-solid fa-paper-plane" style="margin-left:10px;"></i></button>
                </form>
            </div>
        </div>
    </div>
</section>

<style>
    @media (max-width: 992px) {
        .contact-card {
            grid-template-columns: 1fr !important;
        }

        .contact-sidebar {
            padding: 40px !important;
        }

        .contact-body {
            padding: 40px !important;
        }
    }
</style>
