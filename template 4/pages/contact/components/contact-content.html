<section class="section-padding contact-heritage" style="background: var(--color-white);">
    <div class="container">
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 100px;">
            <div class="heritage-reveal">
                <h2 style="font-size: 4rem; color: var(--color-secondary); line-height: 1.1; margin-bottom: 40px;">KẾT
                    NỐI VỚI <br><span style="color: var(--color-primary);">PTEC</span></h2>
                <div style="display: flex; flex-direction: column; gap: 30px;">
                    <div>
                        <h4
                            style="color: var(--color-primary); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 10px;">
                            Văn phòng trụ sở</h4>
                        <p style="color: var(--color-secondary); font-weight: 700;">Lô F6, KCN Rạch Bắp, Bến Cát, Bình
                            Dương</p>
                    </div>
                    <div>
                        <h4
                            style="color: var(--color-primary); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 10px;">
                            Hotline</h4>
                        <p style="color: var(--color-secondary); font-weight: 700;">0909 123 456</p>
                    </div>
                    <div>
                        <h4
                            style="color: var(--color-primary); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 10px;">
                            Email</h4>
                        <p style="color: var(--color-secondary); font-weight: 700;">info@ptec.vn</p>
                    </div>
                </div>
            </div>

            <div class="heritage-reveal" data-delay="0.3s">
                <form style="background: var(--color-bg-light); padding: 60px; border: 1px solid rgba(212,175,55,0.2);">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px;">
                        <input type="text" placeholder="Họ và tên"
                            style="width: 100%; padding: 20px; background: white; border: 1px solid #eee; font-family: var(--font-body);">
                        <input type="email" placeholder="Email liên hệ"
                            style="width: 100%; padding: 20px; background: white; border: 1px solid #eee; font-family: var(--font-body);">
                    </div>
                    <input type="text" placeholder="Chủ đề quan tâm"
                        style="width: 100%; padding: 20px; background: white; border: 1px solid #eee; font-family: var(--font-body); margin-bottom: 30px;">
                    <textarea placeholder="Thông điệp từ quý vị..." rows="5"
                        style="width: 100%; padding: 20px; background: white; border: 1px solid #eee; font-family: var(--font-body); margin-bottom: 40px;"></textarea>
                    <button class="btn-heritage" style="width: 100%;">Gửi yêu cầu tư vấn</button>
                </form>
            </div>
        </div>
    </div>
</section>
