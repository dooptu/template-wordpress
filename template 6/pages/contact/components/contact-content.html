<!-- Contact Content -->
<section class="contact-content">

    <!-- Info Cards Row -->
    <div class="contact-info-cards">
        <div class="cinfo-card">
            <div class="cinfo-icon">
                <i class="fas fa-map-marker-alt"></i>
            </div>
            <div class="cinfo-body">
                <h4>Địa chỉ</h4>
                <p>Lô F6, KCN Rạch Bắp, Bến Cát, Bình Dương</p>
            </div>
        </div>
        <div class="cinfo-card">
            <div class="cinfo-icon">
                <i class="fas fa-phone-alt"></i>
            </div>
            <div class="cinfo-body">
                <h4>Hotline</h4>
                <p>0909 123 456</p>
            </div>
        </div>
        <div class="cinfo-card">
            <div class="cinfo-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="cinfo-body">
                <h4>Email</h4>
                <p>info@ptec.vn</p>
            </div>
        </div>
        <div class="cinfo-card">
            <div class="cinfo-icon">
                <i class="fas fa-clock"></i>
            </div>
            <div class="cinfo-body">
                <h4>Giờ làm việc</h4>
                <p>Thứ 2 – Thứ 7: 8:00 – 17:30</p>
            </div>
        </div>
    </div>

    <!-- Form + Map -->
    <div class="contact-form-map">
        <!-- Form -->
        <div class="contact-form-wrapper">
            <div class="form-header">
                <span class="section-label">GỬI TIN NHẮN</span>
                <h2 class="form-title">Để lại thông tin, chúng tôi sẽ liên hệ sớm nhất</h2>
            </div>

            <form class="contact-form" onsubmit="handleContactSubmit(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="cf-name">Họ và tên <span class="required">*</span></label>
                        <input type="text" id="cf-name" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="form-group">
                        <label for="cf-phone">Số điện thoại <span class="required">*</span></label>
                        <input type="tel" id="cf-phone" placeholder="0909 123 456" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cf-email">Email</label>
                        <input type="email" id="cf-email" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="cf-subject">Chủ đề</label>
                        <select id="cf-subject">
                            <option value="">-- Chọn chủ đề --</option>
                            <option>Tư vấn sản phẩm</option>
                            <option>Hợp tác kinh doanh</option>
                            <option>Báo giá dịch vụ</option>
                            <option>Khác</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full">
                    <label for="cf-message">Nội dung <span class="required">*</span></label>
                    <textarea id="cf-message" rows="5" placeholder="Nhập nội dung cần tư vấn..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <span>GỬI TIN NHẮN</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
                <div id="cf-success" class="form-success" style="display:none;">
                    <i class="fas fa-check-circle"></i> Cảm ơn bạn! Chúng tôi sẽ liên hệ trong thời gian sớm nhất.
                </div>
            </form>
        </div>

        <!-- Map -->
        <div class="contact-map">
            <div class="map-header">
                <span class="section-label">BẢN ĐỒ</span>
                <h3 class="map-title">Vị trí của chúng tôi</h3>
            </div>
            <div class="map-embed">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3918.5926!2d106.6341!3d10.9654!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTAuOTY1NCwgMTA2LjYzNDE!5e0!3m2!1svi!2svn!4v1234567890"
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>

</section>

<style>
    .contact-content {
        width: 100%;
    }

    /* Info Cards */
    .contact-info-cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 50px;
    }

    .cinfo-card {
        display: flex;
        align-items: flex-start;
        gap: 15px;
        background: var(--gray-bg);
        border: 1px solid var(--gray-border);
        border-top: 3px solid var(--primary-color);
        padding: 24px 20px;
        transition: all 0.3s ease;
    }

    .cinfo-card:hover {
        border-top-color: var(--secondary-color);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .cinfo-icon {
        width: 44px;
        height: 44px;
        background: var(--primary-color);
        color: var(--secondary-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
    }

    .cinfo-body h4 {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--primary-color);
        margin-bottom: 5px;
        letter-spacing: 1px;
    }

    .cinfo-body p {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.5;
    }

    /* Form + Map Grid */
    .contact-form-map {
        display: grid;
        grid-template-columns: 3fr 2fr;
        gap: 40px;
        align-items: flex-start;
    }

    /* Section Label */
    .section-label {
        display: inline-block;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 3px;
        color: var(--primary-color);
        background: var(--secondary-color);
        padding: 4px 12px;
        margin-bottom: 14px;
    }

    .form-title {
        font-size: 26px;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 28px;
        line-height: 1.3;
    }

    .map-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 20px;
    }

    /* Form */
    .contact-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group.full {
        grid-column: 1 / -1;
    }

    .form-group label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .required {
        color: var(--primary-color);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        border: 1px solid var(--gray-border);
        padding: 12px 15px;
        font-size: 14px;
        font-family: var(--font-main);
        color: var(--text-primary);
        background: var(--white);
        outline: none;
        transition: border 0.2s ease;
        border-radius: 0;
        appearance: none;
        -webkit-appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        border-color: var(--primary-color);
    }

    .form-group textarea {
        resize: vertical;
    }

    .btn-submit {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background: var(--primary-color);
        color: var(--white);
        border: none;
        padding: 14px 32px;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: background 0.3s ease;
        width: fit-content;
    }

    .btn-submit:hover {
        background: var(--primary-hover);
    }

    .btn-submit i {
        color: var(--secondary-color);
    }

    .form-success {
        background: #f0fff4;
        border: 1px solid var(--primary-color);
        color: var(--primary-color);
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* Map */
    .map-embed {
        height: 420px;
        border: 1px solid var(--gray-border);
        overflow: hidden;
    }

    /* Responsive */
    @media (max-width: 1199px) {
        .contact-info-cards {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 991px) {
        .contact-form-map {
            grid-template-columns: 1fr;
        }

        .form-row {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 575px) {
        .contact-info-cards {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
    function handleContactSubmit(e) {
        e.preventDefault();
        var success = document.getElementById('cf-success');
        success.style.display = 'flex';
        e.target.reset();
        setTimeout(function() { success.style.display = 'none'; }, 5000);
    }
</script>
