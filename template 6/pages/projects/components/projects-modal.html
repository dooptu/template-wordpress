<!-- Project Detail Modal -->
<div id="project-modal" class="modal-overlay">
    <div class="modal-container">
        <button id="close-project-modal" class="modal-close-btn">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-content-layout">
            <div class="modal-image-side">
                <img id="modal-project-img" src="" alt="Project Image">
            </div>
            <div class="modal-info-side">
                <h2 id="modal-project-title" class="modal-product-title">PROJECT TITLE</h2>
                <div class="modal-meta">
                    <span class="meta-label">Lĩnh vực:</span>
                    <span id="modal-project-cat" class="meta-value">CATEGORY</span>
                </div>
                <div class="modal-description">
                    <p id="modal-project-desc">Project description goes here...</p>
                    <ul class="spec-list">
                        <li><i class="fas fa-check"></i> <strong>Năm thực hiện:</strong> 2024</li>
                        <li><i class="fas fa-check"></i> <strong>Địa điểm:</strong> Toàn quốc</li>
                        <li><i class="fas fa-check"></i> <strong>Tiêu chuẩn:</strong> Quốc tế / GMP / ISO</li>
                    </ul>
                </div>
                <div class="modal-actions">
                    <button class="btn-primary-action">TƯ VẤN DỰ ÁN TƯƠNG TỰ</button>
                </div>
            </div>
        </div>
    </div>
</div>
