<script>
    (function() {
        const filters = document.querySelectorAll('.filter-btn');
        const items = document.querySelectorAll('.project-gallery-item');
        const modal = document.getElementById('project-modal');
        const closeBtn = document.getElementById('close-project-modal');

        // Filtering
        filters.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                filters.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.getAttribute('data-filter');

                items.forEach(item => {
                    if (filter === 'all' || item.getAttribute('data-category') === filter) {
                        item.style.display = 'block';
                        item.style.opacity = '0';
                        setTimeout(() => item.style.opacity = '1', 50);
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        });

        // Modal Functions
        window.openProjectDetail = function(title, cat, img, desc) {
            const modalTitle = document.getElementById('modal-project-title');
            const modalCat = document.getElementById('modal-project-cat');
            const modalImg = document.getElementById('modal-project-img');
            const modalDesc = document.getElementById('modal-project-desc');
            const modalOverlay = document.getElementById('project-modal');

            if (modalTitle) modalTitle.innerText = title;
            if (modalCat) modalCat.innerText = cat;
            if (modalImg) modalImg.src = img;
            if (modalDesc) modalDesc.innerText = desc;
            
            if (modalOverlay) modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scroll
        };

        if (closeBtn) {
            closeBtn.onclick = function() {
                if (modal) modal.classList.remove('active');
                document.body.style.overflow = '';
            };
        }
    })();
</script>
