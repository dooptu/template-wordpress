<header class="header-modern">
    <!-- Top Utility Bar -->
    <div class="header-utility">
        <div class="container utility-inner">
            <div class="utility-left">
                <span class="welcome-text">Kiến tạo hạ tầng - Nâng tầm công nghiệp</span>
            </div>
            <div class="utility-right">
                <div class="contact-item">
                    <i class="fas fa-phone-alt"></i> <strong>0909 123 456</strong>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i> info@ptec.vn
                </div>
                <div class="lang-dropdown">
                    <span>VN <i class="fas fa-angle-down"></i></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Header -->
    <div class="header-main">
        <div class="container header-main-inner">
            <!-- Logo -->
            <div class="header-brand">
                <a href="#" onclick="navigate('home')">
                    <img src="assets/img/logo.png" alt="PTEC Logo" class="brand-logo">
                </a>
            </div>

            <!-- Navigation -->
            <nav class="header-nav" id="mainNav">
                <ul class="nav-list">
                    <li><a href="#" onclick="navigate('home')">Trang chủ</a></li>
                    <li><a href="#" onclick="navigate('about')">Giới thiệu</a></li>
                    <li><a href="#" onclick="navigate('product')">Sản phẩm</a></li>
                    <li><a href="#" onclick="navigate('sector')">Lĩnh vực</a></li>
                    <li><a href="#" onclick="navigate('projects')">Dự án</a></li>
                    <li><a href="#" onclick="navigate('news')">Tin tức</a></li>
                    <li><a href="#" onclick="navigate('career')">Tuyển dụng</a></li>
                    <li><a href="#" onclick="navigate('library')">Tài liệu</a></li>
                    <li><a href="#" onclick="navigate('contact')">Liên hệ</a></li>
                </ul>
            </nav>


            <!-- Actions -->
            <div class="header-actions">
                <!-- Mobile Menu Button -->
                <button class="hamburger-menu" id="hamburgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </div>
</header>

<style>
    /* ==============================================================
       HEADER V2 - MODERN MINIMALIST (Architectural & High-End)
       ============================================================== */
    .header-modern {
        background: var(--white);
        width: 100%;
        position: relative;
        z-index: 1000;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }

    /* --- Top Utility Bar --- */
    .header-utility {
        background: var(--primary-color);
        color: var(--white);
        font-size: 13px;
        padding: 8px 0;
    }

    .utility-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .utility-left .welcome-text {
        letter-spacing: 0.5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0;
        color: white;
    }

    .utility-right {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    .contact-item {
        display: flex;
        align-items: center;
        gap: 8px;
        opacity: 0.9;
    }

    .contact-item i {
        color: var(--secondary-color);
    }

    .contact-item strong {
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .lang-dropdown {
        cursor: pointer;
        padding-left: 20px;
        border-left: 1px solid rgba(255, 255, 255, 0.2);
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .lang-dropdown:hover {
        color: var(--secondary-color);
    }

    /* --- Main Header Area --- */
    .header-main {
        background: var(--white);
        padding: 15px 0;
        border-bottom: 3px solid var(--secondary-color);
    }

    .header-main-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 30px;
    }

    /* Logo */
    .header-brand .brand-logo {
        height: 50px;
        width: 70px;
        object-fit: contain;
        display: block;
        transition: transform 0.3s ease;
    }

    .header-brand:hover .brand-logo {
        transform: scale(1.05);
    }

    /* Navigation */
    .header-nav {
        flex: 1;
        display: flex;
        justify-content: center;
    }

    .nav-list {
        display: flex;
        align-items: center;
        gap: 2vw;
        /* Flexible gap based on screen width */
        margin: 0;
        padding: 0;
        list-style: none;
    }

    .nav-list a {
        color: var(--text-primary);
        font-weight: 700;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 10px 0;
        position: relative;
        transition: color 0.3s ease;
    }

    /* Minimal Hover Outline Animation */
    .nav-list a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--primary-color);
        transition: width 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .nav-list a:hover,
    .nav-list a.active {
        color: var(--primary-color);
    }

    .nav-list a:hover::after,
    .nav-list a.active::after {
        width: 100%;
    }

    /* Actions Area (Hamburger) */
    .header-actions {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* Mobile Hamburger */
    .hamburger-menu {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        flex-direction: column;
        justify-content: space-between;
        height: 18px;
        width: 24px;
        padding: 0;
    }

    .hamburger-menu span {
        display: block;
        width: 100%;
        height: 2px;
        background-color: var(--primary-color);
        transition: all 0.3s ease;
    }

    /* ===== RESPONSIVE DESIGN ===== */

    @media (max-width: 1199px) {
        .nav-list {
            gap: 15px;
        }
    }

    @media (max-width: 991px) {
        .utility-left {
            display: none;
        }

        .utility-inner {
            justify-content: center;
        }

        .header-main-inner {
            gap: 15px;
        }

        .nav-list a {
            font-size: 13px;
            letter-spacing: 0;
        }
    }

    @media (max-width: 768px) {
        .utility-right {
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .hamburger-menu {
            display: flex;
        }

        .header-nav {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--white);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.05);
            border-top: 1px solid #eee;

            /* Hidden by default */
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            z-index: 999;
        }

        .header-nav.open {
            max-height: 500px;
            /* Arbitrary high value to allow slide down */
            transition: max-height 0.4s ease-in;
        }

        .nav-list {
            flex-direction: column;
            gap: 0;
            padding: 10px 0;
        }

        .nav-list li {
            width: 100%;
            text-align: center;
        }

        .nav-list a {
            padding: 12px 20px;
            display: block;
            border-bottom: 1px solid #f5f5f5;
        }

        .nav-list a::after {
            display: none;
            /* Remove bottom line animation on mobile */
        }

        .nav-list a:hover {
            background-color: rgba(0, 0, 128, 0.05);
            /* Slight navy tint on hover */
        }
    }
</style>

<script>
    (function () {
        var btn = document.getElementById('hamburgerBtn');
        var nav = document.getElementById('mainNav');
        if (btn && nav) {
            btn.addEventListener('click', function () {
                nav.classList.toggle('open');
            });
        }
    })();
</script>
