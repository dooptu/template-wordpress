<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTEC Việt Nam | Kiến tạo hạ tầng - Nâng tầm công nghiệp</title>
    <link rel="icon" href="assets/img/logo.png" type="image/png">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="header-placeholder"></div>

    <main id="main-content">
        <!-- Content will be loaded here -->
    </main>

    <footer id="footer-placeholder"></footer>

    <script>
        async function loadComponent(id, path) {
            try {
                const response = await fetch(path);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const html = await response.text();
                const container = document.getElementById(id);
                if (container) {
                    container.innerHTML = html;
                    const scripts = container.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        if (script.src) {
                            newScript.src = script.src;
                        } else {
                            newScript.textContent = script.textContent;
                        }
                        document.body.appendChild(newScript);
                    });
                }
            } catch (error) {
                console.error('System Error Loading Component:', path, error);
            }
        }

        async function navigate(page) {
            const main = document.getElementById('main-content');
            main.style.opacity = '0';

            // Determine active menu item (map detail pages to parent items)
            let activeMenu = page;
            if (page === 'news-detail') activeMenu = 'news';
            if (page === 'career-detail') activeMenu = 'career';

            // Set active class in Header Nav
            const navLinks = document.querySelectorAll('#mainNav .nav-list a');
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('onclick') && link.getAttribute('onclick').includes(`navigate('${activeMenu}')`)) {
                    link.classList.add('active');
                }
            });

            setTimeout(async () => {
                const path = `pages/${page}/${page}.html`;
                await loadComponent('main-content', path);
                main.style.opacity = '1';
                window.scrollTo(0, 0);
            }, 300);
        }

        window.viewNewsDetail = function (title, date, cat, img, excerpt) {
            sessionStorage.setItem('newsDetail', JSON.stringify({ title, date, cat, img, excerpt }));
            navigate('news-detail');
        };

        window.viewJobDetail = function (title, loc, type, salary) {
            sessionStorage.setItem('currentJob', JSON.stringify({ title, loc, type, salary }));
            navigate('career-detail');
        };

        // Global Image Fallback Handler — picks a random image from existing URLs
        const _fallbackImgs = [
            'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1516937941344-00b4e0337589?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1540575861501-7cf05a4b125a?auto=format&fit=crop&w=800&q=80'
        ];
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG' && !e.target.dataset.fallback) {
                e.target.dataset.fallback = '1';
                e.target.src = _fallbackImgs[Math.floor(Math.random() * _fallbackImgs.length)];
            }
        }, true);

        document.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('header-placeholder', 'components/header.html');
            loadComponent('footer-placeholder', 'components/footer.html');
            navigate('home');
        });
    </script>
    <style>
        #main-content {
            transition: opacity 0.3s ease;
            min-height: 100vh;
        }
    </style>
</body>

</html>
